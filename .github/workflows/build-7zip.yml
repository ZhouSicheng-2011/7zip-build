name: Build 7-Zip Core Libraries (Cross-Platform)

on:
  push:
    tags:
      - 'Windows-*'   # 触发Windows构建
      - 'Linux-*'     # 触发Linux构建
  workflow_dispatch:  # 允许手动触发

defaults:
  run:
    shell: bash

jobs:
  # ==================== Windows 构建任务 ====================
  build-windows:
    if: startsWith(github.ref, 'refs/tags/Windows-')
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [x86, x64, arm64]
    steps:
      - name: 📥 1. 提取版本号
        id: extract_version
        run: |
          # 从Windows-2600格式的标签中提取2600作为版本号
          TAG_NAME=${GITHUB_REF#refs/tags/}
          VERSION=${TAG_NAME#Windows-}
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "Extracted version: $VERSION"

      - name: 📦 2. 下载官方7-Zip源代码
        shell: pwsh
        run: |
          $url = "https://www.7-zip.org/a/7z$env:VERSION-src.tar.xz"
          Write-Host "Downloading from: $url"
          Invoke-WebRequest -Uri $url -OutFile 7z-src.tar.xz

      - name: 📂 3. 解压源代码
        shell: pwsh
        run: |
          tar -xf 7z-src.tar.xz
          # 解压后的目录名为 '7z<VERSION>-src'，例如 '7z2600-src'
          $srcDir = "7z$env:VERSION-src"
          echo "SRC_DIR=$srcDir" >> $env:GITHUB_ENV
          Write-Host "Source directory: $srcDir"

      - name: ⚙️ 4. 配置MSVC编译环境
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: ${{ matrix.arch }}

      - name: 🛠️ 5. 执行NMAKE构建 (汇编优化)
        working-directory: ${{ env.SRC_DIR }}/CPP/7zip
        run: |
          # /A 参数强制重新构建所有目标，确保汇编优化完全生效
          nmake /A

      - name: 🔍 6. 收集产物文件 (.dll, .exe, .sfx)
        shell: pwsh
        run: |
          $artifactsDir = "windows-artifacts"
          New-Item -ItemType Directory -Force -Path $artifactsDir
          # 递归搜索源目录下的所有 .dll, .exe, .sfx 文件
          Get-ChildItem -Path $env:SRC_DIR -Recurse -Include *.dll, *.exe, *.sfx | ForEach-Object {
              Copy-Item $_.FullName -Destination $artifactsDir
          }
          Write-Host "Collected artifacts:"
          Get-ChildItem -Path $artifactsDir
          echo "ARTIFACTS_DIR=$artifactsDir" >> $env:GITHUB_ENV

      - name: ⬆️ 7. 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: 7zip-windows-${{ matrix.arch }}-${{ env.VERSION }}
          path: ${{ env.ARTIFACTS_DIR }}/

  # ==================== Linux 构建任务 (manylinux) ====================
  build-linux:
    if: startsWith(github.ref, 'refs/tags/Linux-')
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        platform: 
          - { name: manylinux_2_28, image: quay.io/pypa/manylinux_2_28_x86_64, tag_suffix: '' }
          - { name: manylinux2014, image: quay.io/pypa/manylinux2014_x86_64, tag_suffix: '' }
    container:
      image: ${{ matrix.platform.image }}
      options: --user root
    steps:
      - name: 📥 1. 提取版本号
        run: |
          TAG_NAME=${GITHUB_REF#refs/tags/}
          VERSION=${TAG_NAME#Linux-}
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "Extracted version: $VERSION"

      - name: 📦 2. 下载7-Zip-zstd源代码
        run: |
          URL="https://github.com/mcmilk/7-Zip-zstd/archive/refs/tags/${VERSION}.zip"
          echo "Downloading from: $URL"
          curl -L -o 7zip-zstd-src.zip "$URL"

      - name: 📂 3. 解压源代码
        run: |
          unzip -q 7zip-zstd-src.zip
          # 目录名格式: 7-Zip-zstd-<版本号>-R<修订号>
          SRC_DIR=$(find . -maxdepth 1 -type d -name "7-Zip-zstd-*" | head -1)
          echo "SRC_DIR=$SRC_DIR" >> $GITHUB_ENV
          echo "Source directory: $SRC_DIR"

      - name: ⚙️ 4. 安装构建依赖 (静态链接C++运行时)
        run: |
          # 安装gcc/g++和相关工具链
          yum install -y gcc gcc-c++ make wget
          # 配置环境变量，实现C++运行时的静态链接
          echo "LDFLAGS=-static-libgcc -static-libstdc++" >> $GITHUB_ENV
          echo "CXXFLAGS=-static-libgcc -static-libstdc++" >> $GITHUB_ENV
          # 确保汇编优化被启用
          echo "USE_ASM=1" >> $GITHUB_ENV

      - name: 🛠️ 5. 执行make构建 (汇编优化)
        working-directory: ${{ env.SRC_DIR }}/CPP/7zip/Bundles/Format7zF
        run: |
          make -f makefile.gcc

      - name: 🔍 6. 收集产物文件 (7z.so)
        run: |
          mkdir -p linux-artifacts
          # 搜索整个源目录下的 7z.so
          find ${{ env.SRC_DIR }} -name "7z.so" -exec cp {} linux-artifacts/ \;
          echo "Collected artifacts:"
          ls -la linux-artifacts/
          echo "ARTIFACTS_DIR=linux-artifacts" >> $GITHUB_ENV

      - name: ⬆️ 7. 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: 7zip-zstd-linux-${{ matrix.platform.name }}-${{ env.VERSION }}
          path: ${{ env.ARTIFACTS_DIR }}/
